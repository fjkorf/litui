# Machine-specific build configuration — NOT committed (see .gitignore).
#
# Build artifacts are redirected to an APFS sparse-bundle disk image on the
# external Samsung T5 (the T5 itself is exFAT, which is unreliable/slow for a
# cargo target dir; the APFS image gives cargo a native filesystem).
#
# The image must be MOUNTED before building:
#   hdiutil attach /Volumes/Samsung_T5/litui-build.sparsebundle
# It mounts at /Volumes/litui-build. If absent, cargo errors clearly rather
# than scattering artifacts. To reclaim exFAT space after big builds:
#   hdiutil detach /Volumes/litui-build
#   hdiutil compact /Volumes/Samsung_T5/litui-build.sparsebundle
[build]
target-dir = "/Volumes/litui-build/litui-target"
