name: Deploy Rust Docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required so the GITHUB_TOKEN can push the built docs to the gh-pages branch
# (the default token is read-only; without this peaceiris fails with HTTP 403).
permissions:
  contents: write

# Avoid overlapping deploys racing on the gh-pages branch.
concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build documentation
        run: cargo doc -p litui --no-deps --target-dir target/docs

      # cargo doc emits the site to target/docs/doc/ (crate pages, shared CSS/JS,
      # search index). Add a root redirect so the bare Pages URL lands on litui.
      - name: Add root redirect to litui docs
        run: echo '<meta http-equiv="refresh" content="0;url=litui/index.html">' > target/docs/doc/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: target/docs/doc
          destination_dir: .
